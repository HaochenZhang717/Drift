handler: models.FlowTS.handler
model:
  target: models.interpretable_diffusion_flowts.FMTS.FM_TS
  params:
    seq_length: 512
    feature_size: 1
    n_layer_enc: 4
    n_layer_dec: 3
    d_model: 64
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-4
  max_epochs: 1001
  gradient_accumulate_every: 1
  save_cycle: 100
  ema:
    decay: 0.995

dataloader:
  train_dataset:
    target: data_provider.datasets.glucose_sliding.GlucoseSliding
    params:
      datasets_dir: /playpen-shared/haochenz/AI-READI-Dataset/AI-READI-processed
      seq_len: 512
      stride: 128
      rel_path: glucose_{split}.parquet
      flag: train

  val_dataset:
    target: data_provider.datasets.glucose_sliding.GlucoseSliding
    params:
      datasets_dir: /playpen-shared/haochenz/AI-READI-Dataset/AI-READI-processed
      seq_len: 512
      stride: 128
      rel_path: glucose_{split}.parquet
      flag: valid

  batch_size: 512
  sample_size: 512
  shuffle: true
