# training:
epochs: 3
batch_size: 64
learning_rate: 0.0001
weight_decay: 0.00001
logging_iter: 1
no_test_model: true
num_workers: 0
tags: []
run_dir: FlowTS/debug_ErcotData_len256/

# Data provider args consumed by baselines/ImagenFew/run.py
datasets_dir: /Users/zhc/Documents/Time_Series_Datasets
seq_len: 256
pretrain: false
datasets:
  - name: ErcotData
    data: ErcotData
    rel_path: ERCOT_merged.csv
    stride: 64
train_on_datasets:
  - ErcotData

handler: models.FlowTS.handler
model:
  target: models.interpretable_diffusion_flowts.FMTS.FM_TS
  params:
    seq_length: 256
    feature_size: 1
    n_layer_enc: 4
    n_layer_dec: 3
    d_model: 96
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-4
  max_epochs: 4001
  gradient_accumulate_every: 1
  save_cycle: 100
  ema:
    decay: 0.995

dataloader:
  train_dataset:
    target: data_provider.datasets.local_timeseries.ErcotData
    params:
      datasets_dir: /Users/zhc/Documents/Time_Series_Datasets
      rel_path: ERCOT_merged.csv
      seq_len: 256
      stride: 64
      flag: train

  val_dataset:
    target: data_provider.datasets.local_timeseries.ErcotData
    params:
      datasets_dir: /Users/zhc/Documents/Time_Series_Datasets
      rel_path: ERCOT_merged.csv
      seq_len: 256
      stride: 64
      flag: valid

  batch_size: 512
  sample_size: 512
  shuffle: true
